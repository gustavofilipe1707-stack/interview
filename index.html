<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR Unified Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b111a; color: #cfd8dc; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        
        /* Seletor Inicial e Login */
        #selector, #login-box { text-align: center; background: #161e2b; padding: 40px; border-radius: 16px; margin-top: 100px; border: 1px solid #232d3d; }
        .btn-main { display: block; width: 100%; padding: 18px; margin: 15px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-blue { background: #00a2ff; color: white; }
        .btn-gray { background: #37474f; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #0b111a; color: white; text-align: center; box-sizing: border-box; }

        /* Estilos da sua Estação */
        #view-station, #view-server { display: none; }
        .card { background: #161e2b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #00a2ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h2 { color: #00a2ff; margin-top: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #232d3d; }
        .label { color: #90a4ae; }
        .val { color: #fff; font-weight: bold; font-family: 'Consolas', monospace; }
        .summary-box { background: #1c2738; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #455a64; line-height: 1.5; }
        .btn-save { background: #00e676; color: #0b111a; }
        .btn-anydesk { background: #ef4444; color: white; }

        /* Estilos do Server */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .st-card { background: #161e2b; padding: 20px; border-radius: 10px; border-left: 8px solid #444; }
        .st-online { border-left-color: #00e676; }
        .st-warning { border-left-color: #ef4444; animation: blink 1s infinite; }
        .st-offline { opacity: 0.4; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .excelente { color: #00e676; }
        .media { color: #ffeb3b; }
        .ruim { color: #ff9100; }
        .pessima { color: #ff5252; }
    </style>
</head>
<body>

    <div id="selector" class="container">
        <h1 style="color:#00a2ff">HSR UNIFIED</h1>
        <button class="btn-main btn-blue" onclick="initStation()">MODO ESTAÇÃO</button>
        <button class="btn-main btn-gray" onclick="showLogin()">MODO SERVER (MONITOR)</button>
    </div>

    <div id="login-box" class="container">
        <h2>Acesso Administrativo</h2>
        <input type="password" id="pass-field" placeholder="Senha..." onkeydown="if(event.key==='Enter') verifyPass()">
        <button class="btn-main btn-blue" onclick="verifyPass()">ENTRAR</button>
        <button style="background:none; border:none; color:#90a4ae; cursor:pointer" onclick="location.reload()">Voltar</button>
    </div>

    <div id="view-station" class="container">
        <div id="capture-area">
            <div class="card">
                <h2 id="st-title">🌐 Identificação</h2>
                <div class="info-row"><span class="label">IP de Internet:</span> <span id="ip-res" class="val">...</span></div>
                <div class="info-row"><span class="label">Provedor (ISP):</span> <span id="isp-res" class="val">...</span></div>
                <div class="info-row"><span class="label">Localização:</span> <span id="geo-res" class="val">...</span></div>
            </div>
            <div class="card">
                <h2>📡 Performance HSR</h2>
                <div class="info-row"><span class="label">Latência:</span> <span id="ping-val" class="val">...</span></div>
                <div class="info-row"><span class="label">Saúde da CPU:</span> <span id="cpu-val" class="val">...</span></div>
            </div>
            <div class="card">
                <h2>📊 Resumo & Diagnóstico</h2>
                <div id="summary-text" class="summary-box">Iniciando análise...</div>
            </div>
        </div>
        <button onclick="saveAsJpeg()" class="btn-main btn-save">📸 SALVAR TELA COMO JPEG</button>
        <a href="https://anydesk.com/pt/downloads/thank-you?dv=win_exe" class="btn-main btn-anydesk" style="text-decoration:none; text-align:center">🚀 BAIXAR ANYDESK</a>
    </div>

    <div id="view-server" style="max-width:1200px; margin:auto">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
            <h1>Monitoramento Global HSR</h1>
            <button onclick="db.ref('hsr_monitor').remove()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer">LIMPAR LOGS</button>
        </div>
        <div id="grid-stations" class="grid"></div>
    </div>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let currentCPU = "Analisando";
    let currentPing = 0;

    // --- LÓGICA DE LOGIN ---
    function showLogin() {
        document.getElementById('selector').style.display = 'none';
        document.getElementById('login-box').style.display = 'block';
        document.getElementById('pass-field').focus();
    }
    function verifyPass() {
        if(document.getElementById('pass-field').value === 'hsr') {
            document.getElementById('login-box').style.display = 'none';
            initServer();
        } else { alert("Incorreto"); }
    }

    // --- LÓGICA ESTAÇÃO ---
    function initStation() {
        myName = localStorage.getItem('hsr_name');
        if(!myName) {
            myName = prompt("Nome desta Estação (ex: POA-INTERVIEW-01):");
            if(!myName) return location.reload();
            localStorage.setItem('hsr_name', myName);
        }
        document.getElementById('selector').style.display = 'none';
        document.getElementById('view-station').style.display = 'block';
        document.getElementById('st-title').innerText = "🌐 Máquina: " + myName;
        
        fetchNetInfo();
        measurePing();
        checkCPU(); // Stress inicial
        setInterval(measurePing, 5000); // Ping a cada 5s
        setInterval(checkCPU, 300000); // Stress a cada 5 minutos (300.000ms)
    }

    function fetchNetInfo() {
        fetch('http://ip-api.com/json/?fields=status,city,regionName,isp,query')
            .then(res => res.json()).then(data => {
                if (data.status === "success") {
                    document.getElementById('ip-res').innerText = data.query;
                    document.getElementById('isp-res').innerText = data.isp;
                    document.getElementById('geo-res').innerText = data.city + ", " + data.regionName;
                }
            });
    }

    function checkCPU() {
        const start = performance.now();
        // Stress real de processamento
        while (performance.now() - start < 1500) { Math.sqrt(Math.random() * 100000); }
        const cpuElem = document.getElementById('cpu-val');
        currentCPU = (performance.now() - start) < 1650 ? "Estável" : "Sobrecarga";
        cpuElem.innerText = currentCPU;
        cpuElem.className = "val " + (currentCPU === "Estável" ? "excelente" : "pessima");
    }

    function measurePing() {
        const start = Date.now();
        const img = new Image();
        img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
        img.onload = img.onerror = () => {
            currentPing = Date.now() - start;
            const pElem = document.getElementById('ping-val');
            let statusMsg = ""; let sClass = "";

            if (currentPing <= 30) { statusMsg = "EXCELENTE"; sClass = "excelente"; }
            else if (currentPing <= 50) { statusMsg = "MÉDIA"; sClass = "media"; }
            else if (currentPing <= 80) { statusMsg = "RUIM"; sClass = "ruim"; }
            else { statusMsg = "PÉSSIMA"; sClass = "pessima"; }

            pElem.innerText = currentPing + " ms (" + statusMsg + ")";
            pElem.className = "val " + sClass;

            let resumo = `Sua conexão está <b>${statusMsg}</b>. `;
            resumo += currentPing > 50 ? `<br><span style="color:#ff5252">⚠️ Reinicie o modem.</span>` : `<br><span style="color:#00e676">✅ Qualidade ideal.</span>`;
            document.getElementById('summary-text').innerHTML = resumo;

            // SOBE PRO FIREBASE
            db.ref('hsr_monitor/' + myName).set({
                name: myName,
                ip: document.getElementById('ip-res').innerText,
                ping: currentPing,
                cpu: currentCPU,
                lastSeen: Date.now()
            });
        };
    }

    // --- LÓGICA SERVER ---
    function initServer() {
        document.getElementById('view-server').style.display = 'block';
        db.ref('hsr_monitor').on('value', snap => {
            const grid = document.getElementById('grid-stations');
            grid.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.values(data).forEach(st => {
                const isOff = (Date.now() - st.lastSeen) > 20000;
                const isBad = st.ping > 50 || st.cpu === "Sobrecarga";
                const cardClass = isOff ? 'st-offline' : (isBad ? 'st-warning' : 'st-online');
                
                grid.innerHTML += `
                    <div class="st-card ${cardClass}">
                        <div style="font-weight:bold; color:#00a2ff; margin-bottom:10px">${st.name}</div>
                        <div style="font-size:0.8rem">IP: ${st.ip}</div>
                        <div style="margin-top:10px">Ping: <b class="${st.ping > 50 ? 'pessima' : 'excelente'}">${st.ping}ms</b></div>
                        <div>CPU: <b class="${st.cpu === 'Estável' ? 'excelente' : 'pessima'}">${st.cpu}</b></div>
                        <div style="font-size:0.7rem; margin-top:10px; opacity:0.5">${isOff ? 'OFFLINE' : 'CONECTADO'}</div>
                    </div>`;
            });
        });
    }

    function saveAsJpeg() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'diagnostico_hsr.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        });
    }
</script>
</body>
</html>
