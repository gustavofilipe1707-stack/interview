<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR Unified - Monitoramento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b111a; color: #cfd8dc; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        #selector, #login-box { text-align: center; background: #161e2b; padding: 40px; border-radius: 16px; margin-top: 100px; border: 1px solid #232d3d; }
        .btn-main { display: block; width: 100%; padding: 18px; margin: 15px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; text-decoration: none; }
        .btn-blue { background: #00a2ff; color: white; }
        .btn-gray { background: #37474f; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #0b111a; color: white; text-align: center; box-sizing: border-box; }

        /* Estação */
        #view-station, #view-server { display: none; }
        .card { background: #161e2b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #00a2ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h2 { color: #00a2ff; margin-top: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #232d3d; }
        .label { color: #90a4ae; }
        .val { color: #fff; font-weight: bold; font-family: 'Consolas', monospace; }
        .summary-box { background: #1c2738; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #455a64; line-height: 1.5; }

        /* Server Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .st-card { background: #161e2b; padding: 20px; border-radius: 10px; border-left: 8px solid #444; }
        .st-online { border-left-color: #00e676; }
        .st-warning { border-left-color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        .excelente { color: #00e676; } .pessima { color: #ff5252; }
    </style>
</head>
<body>

    <div id="selector" class="container">
        <h1 style="color:#00a2ff">HSR UNIFIED</h1>
        <button class="btn-main btn-blue" onclick="initStation()">ENTRAR COMO ESTAÇÃO</button>
        <button class="btn-main btn-gray" onclick="showLogin()">ENTRAR COMO SERVER</button>
    </div>

    <div id="login-box" class="container">
        <h2>Acesso Monitor</h2>
        <input type="password" id="pass-field" placeholder="Senha..." onkeydown="if(event.key==='Enter') verifyPass()">
        <button class="btn-main btn-blue" onclick="verifyPass()">ACESSAR PAINEL</button>
    </div>

    <div id="view-station" class="container">
        <div id="capture-area">
            <div class="card">
                <h2 id="st-title">🌐 DIAGNÓSTICO</h2>
                <div class="info-row"><span class="label">IP:</span> <span id="ip-res" class="val">Detectando...</span></div>
                <div class="info-row"><span class="label">ISP:</span> <span id="isp-res" class="val">Detectando...</span></div>
            </div>
            <div class="card">
                <h2>📡 PERFORMANCE</h2>
                <div class="info-row"><span class="label">Ping:</span> <span id="ping-val" class="val">...</span></div>
                <div class="info-row"><span class="label">CPU:</span> <span id="cpu-val" class="val">...</span></div>
            </div>
            <div class="card"><div id="summary-text" class="summary-box">Iniciando...</div></div>
        </div>
        <button onclick="saveAsJpeg()" class="btn-main" style="background:#00e676; color:#0b111a">📸 SALVAR RELATÓRIO</button>
        <a href="https://cati.fastquest.net/frmlogin.aspx" target="_blank" class="btn-main btn-blue" style="text-align:center">➜ LOGIN FASTDIALER</a>
    </div>

    <div id="view-server" style="max-width:1200px; margin:auto; padding:20px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
            <h1>Monitoramento Global HSR</h1>
            <button onclick="db.ref('hsr_monitor').remove()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer">LIMPAR PAINEL</button>
        </div>
        <div id="grid-stations" class="grid"></div>
    </div>

<script>
    // Configurações do seu banco criado
    const firebaseConfig = { databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = ""; let currentCPU = "Estável"; let currentIP = ""; let currentISP = "";

    function showLogin() { document.getElementById('selector').style.display='none'; document.getElementById('login-box').style.display='block'; document.getElementById('pass-field').focus(); }
    function verifyPass() { if(document.getElementById('pass-field').value === 'hsr') { document.getElementById('login-box').style.display='none'; initServer(); } }

    function initStation() {
        myName = prompt("Identificação da Máquina (Ex: POA-01):");
        if(!myName) return;
        document.getElementById('selector').style.display='none';
        document.getElementById('view-station').style.display='block';
        document.getElementById('st-title').innerText = "🌐 MÁQUINA: " + myName;
        
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            currentIP = d.ip; currentISP = d.org;
            document.getElementById('ip-res').innerText = d.ip;
            document.getElementById('isp-res').innerText = d.org;
        });

        runStress(); measurePing();
        setInterval(measurePing, 5000); 
        setInterval(runStress, 300000); // Stress a cada 5 min
    }

    function runStress() {
        const start = performance.now();
        while (performance.now() - start < 1500) { Math.sqrt(Math.random()); }
        currentCPU = (performance.now() - start) < 1650 ? "Estável" : "Sobrecarga";
        const el = document.getElementById('cpu-val');
        if(el) { el.innerText = currentCPU; el.className = "val " + (currentCPU === "Estável" ? "excelente" : "pessima"); }
    }

    function measurePing() {
        const start = Date.now();
        const img = new Image();
        img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
        img.onload = img.onerror = () => {
            const ping = Date.now() - start;
            document.getElementById('ping-val').innerText = ping + " ms";
            document.getElementById('ping-val').className = "val " + (ping > 50 ? "pessima" : "excelente");
            document.getElementById('summary-text').innerHTML = ping > 50 ? "⚠️ Latência alta detectada." : "✅ Conexão estável para voz.";
            
            // Envia pro Firebase
            db.ref('hsr_monitor/' + myName).update({
                name: myName, ip: currentIP, isp: currentISP, ping: ping, cpu: currentCPU, lastSeen: Date.now()
            });
        };
    }

    function initServer() {
        document.getElementById('view-server').style.display='block';
        db.ref('hsr_monitor').on('value', snap => {
            const grid = document.getElementById('grid-stations');
            grid.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.values(data).forEach(st => {
                const isOff = (Date.now() - st.lastSeen) > 15000;
                const isBad = st.ping > 50 || st.cpu === "Sobrecarga";
                grid.innerHTML += `
                    <div class="st-card ${isOff ? '' : (isBad ? 'st-warning' : 'st-online')}" style="${isOff ? 'opacity:0.4' : ''}">
                        <b style="color:#00a2ff">${st.name}</b><br>
                        <small>${st.ip || '---'}</small><br><br>
                        Ping: <b class="${st.ping > 50 ? 'pessima' : 'excelente'}">${st.ping}ms</b><br>
                        CPU: <b class="${st.cpu === 'Estável' ? 'excelente' : 'pessima'}">${st.cpu}</b><br>
                        <div style="font-size:0.7rem; margin-top:10px">${isOff ? '🔴 OFFLINE' : '🟢 ONLINE'}</div>
                    </div>`;
            });
        });
    }

    function saveAsJpeg() { html2canvas(document.querySelector("#capture-area")).then(c => { const a = document.createElement('a'); a.download = 'hsr.jpg'; a.href = c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
