<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR Unified v4.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b111a; color: #cfd8dc; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        #selector, #login-box { text-align: center; background: #161e2b; padding: 40px; border-radius: 16px; margin-top: 50px; border: 1px solid #232d3d; }
        .btn-main { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #00a2ff; color: white; }
        .card { background: #161e2b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #00a2ff; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #232d3d; }
        .val { color: #fff; font-weight: bold; font-family: monospace; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .st-card { background: #161e2b; padding: 15px; border-radius: 10px; border-left: 5px solid #00e676; }
        .offline { opacity: 0.5; border-left-color: #555; }
        .warning { border-left-color: #ff5252; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="selector" class="container">
        <h1 style="color:#00a2ff">HSR UNIFIED</h1>
        <button class="btn-main btn-blue" style="width:100%" onclick="initStation()">MODO ESTAÇÃO</button>
        <button class="btn-main" style="width:100%; background:#37474f; color:white" onclick="showLogin()">MODO SERVER</button>
    </div>

    <div id="login-box" class="container" style="display:none">
        <h2>Senha do Painel</h2>
        <input type="password" id="pass-field" placeholder="Digite..." style="width:100%; padding:10px; margin-bottom:10px" onkeydown="if(event.key==='Enter') verifyPass()">
        <button class="btn-main btn-blue" style="width:100%" onclick="verifyPass()">ENTRAR</button>
    </div>

    <div id="view-station" class="container" style="display:none">
        <div id="capture-area">
            <div class="card">
                <h2 id="st-title">DIAGNÓSTICO</h2>
                <div class="info-row"><span>IP:</span> <span id="ip-res" class="val">Buscando...</span></div>
                <div class="info-row"><span>Ping:</span> <span id="ping-val" class="val">...</span></div>
                <div class="info-row"><span>CPU:</span> <span id="cpu-val" class="val">...</span></div>
            </div>
        </div>
        <button onclick="saveAsJpeg()" class="btn-main" style="width:100%; background:#00e676">📸 SALVAR RELATÓRIO</button>
    </div>

    <div id="view-server" style="display:none">
        <h1 style="text-align:center">Painel HSR em Tempo Real</h1>
        <div id="grid-stations" class="grid"></div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let currentCPU = "Estável";

    function showLogin() { document.getElementById('selector').style.display='none'; document.getElementById('login-box').style.display='block'; }
    function verifyPass() { if(document.getElementById('pass-field').value === 'hsr') { document.getElementById('login-box').style.display='none'; initServer(); } }

    function initStation() {
        myName = prompt("Nome da Estação:");
        if(!myName) return;
        document.getElementById('selector').style.display='none';
        document.getElementById('view-station').style.display='block';
        document.getElementById('st-title').innerText = "MÁQUINA: " + myName;
        
        // Loop de monitoramento
        setInterval(measure, 5000);
        setInterval(stress, 300000); // Stress 5 min
        measure(); stress();
    }

    function stress() {
        const start = performance.now();
        while (performance.now() - start < 1000) { Math.sqrt(Math.random()); }
        currentCPU = (performance.now() - start) < 1200 ? "Estável" : "Lento";
        document.getElementById('cpu-val').innerText = currentCPU;
    }

    function measure() {
        const start = Date.now();
        const img = new Image();
        img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
        img.onload = img.onerror = () => {
            const ping = Date.now() - start;
            document.getElementById('ping-val').innerText = ping + "ms";
            
            // BUSCAR IP E ENVIAR TUDO JUNTO
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(data => {
                document.getElementById('ip-res').innerText = data.ip;
                db.ref('hsr_monitor/' + myName).set({
                    name: myName, ip: data.ip, ping: ping, cpu: currentCPU, lastSeen: Date.now()
                });
            });
        };
    }

    function initServer() {
        document.getElementById('view-server').style.display='block';
        db.ref('hsr_monitor').on('value', snap => {
            const grid = document.getElementById('grid-stations');
            grid.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.values(data).forEach(st => {
                const isOff = (Date.now() - st.lastSeen) > 15000;
                const statusClass = isOff ? 'offline' : (st.ping > 50 ? 'warning' : '');
                grid.innerHTML += `
                    <div class="st-card ${statusClass}">
                        <b>${st.name}</b><br>
                        <small>${st.ip}</small><br>
                        Ping: ${st.ping}ms | CPU: ${st.cpu}
                    </div>`;
            });
        });
    }

    function saveAsJpeg() { html2canvas(document.querySelector("#capture-area")).then(c => { const a = document.createElement('a'); a.download = 'hsr.jpg'; a.href = c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
