<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR | NOC Dashboard v6.2 - SUL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b111a; --card: #161e2b; --blue: #00a2ff; --red: #ef4444; --green: #00e676; --text: #cfd8dc; --border: #232d3d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .list-container { max-width: 1100px; margin: 0 auto 30px; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #1c2738; color: var(--blue); text-transform: uppercase; font-size: 0.75rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        
        h2 { max-width: 1100px; margin: 10px auto; font-size: 1rem; text-transform: uppercase; display: flex; align-items: center; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        
        .online-title { color: var(--green); }
        .offline-title { color: #78909c; }
        
        .bg-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .bg-red { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 1.5s infinite; }
        .bg-gray { background: #546e7a; }

        .excelente { color: var(--green); font-weight: bold; }
        .pessima { color: var(--red); font-weight: bold; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-del { background: none; border: 1px solid var(--red); color: var(--red); cursor: pointer; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; }
        #selector, #login-box, #view-station, #view-server { display: none; }
        #selector.active, #login-box.active, #view-station.active, #view-server.active { display: block; }
    </style>
</head>
<body>

    <div id="selector" class="active" style="text-align:center; margin-top:100px;">
        <h1 style="color:var(--blue)">HSR UNIFIED SUL</h1>
        <button onclick="initStation()" style="padding:15px 30px; cursor:pointer; font-weight:bold">MODO ESTAÇÃO</button>
        <button onclick="showLogin()" style="padding:15px 30px; cursor:pointer; margin-left:10px">MODO SERVER</button>
    </div>

    <div id="login-box" style="text-align:center; margin-top:100px;">
        <input type="password" id="pass-field" placeholder="Senha..." style="padding:10px;">
        <button onclick="verifyPass()" style="padding:10px 20px;">ENTRAR</button>
    </div>

    <div id="view-server">
        <h1 style="text-align:center">HSR NOC - Monitoramento Sul</h1>
        
        <h2 class="online-title"><span class="dot bg-green"></span> Máquinas Online</h2>
        <div class="list-container">
            <table>
                <thead>
                    <tr><th>Máquina</th><th>Região</th><th>Latência (Ideal < 90ms)</th><th>Status</th></tr>
                </thead>
                <tbody id="online-body"></tbody>
            </table>
        </div>

        <h2 class="offline-title"><span class="dot bg-gray"></span> Offline (Inativo > 1 min)</h2>
        <div class="list-container" style="opacity: 0.6;">
            <table>
                <tbody id="offline-body"></tbody>
            </table>
        </div>
    </div>

    <div id="view-station" style="text-align:center; margin-top:50px;">
        <h1 id="st-name" style="color:var(--blue)">---</h1>
        <h2 id="st-ping">Calculando...</h2>
        <p>Sinalizando para o servidor a cada 3s</p>
    </div>

<script>
    // Database HSR Interview
    const firebaseConfig = { databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showLogin() { document.getElementById('selector').classList.remove('active'); document.getElementById('login-box').classList.add('active'); }
    function verifyPass() { if(document.getElementById('pass-field').value==='hsr'){ document.getElementById('login-box').classList.remove('active'); initServer(); } }

    function initStation() {
        let n = prompt("Nome da Estação (ex: RS-INT-01):");
        if(!n) return;
        document.getElementById('selector').classList.remove('active');
        document.getElementById('view-station').classList.add('active');
        document.getElementById('st-name').innerText = n;

        setInterval(() => {
            const start = Date.now();
            const img = new Image();
            img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
            img.onload = img.onerror = () => {
                const ping = Date.now() - start;
                document.getElementById('st-ping').innerText = ping + "ms";
                db.ref('hsr_monitor/' + n).set({ name: n, ping: ping, lastSeen: Date.now() });
            };
        }, 3000);
    }

    function initServer() {
        document.getElementById('view-server').classList.add('active');
        db.ref('hsr_monitor').on('value', snap => {
            const onBody = document.getElementById('online-body');
            const offBody = document.getElementById('offline-body');
            onBody.innerHTML = ""; offBody.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.keys(data).forEach(key => {
                const st = data[key];
                const diffSeconds = (Date.now() - st.lastSeen) / 1000;

                if (diffSeconds > 300) { 
                    // 5 MINUTOS: Deleta definitivamente
                    db.ref('hsr_monitor/' + key).remove(); 
                } else if (diffSeconds > 60) {
                    // 1 MINUTO: Move para lista offline
                    offBody.innerHTML += `<tr><td width="25%">${st.name}</td><td width="25%">Inativo</td><td width="25%">---</td><td><button class="btn-del" onclick="del('${key}')">Remover</button></td></tr>`;
                } else {
                    // ONLINE: Agora com limite de 90ms
                    const isBad = st.ping > 90;
                    onBody.innerHTML += `
                        <tr>
                            <td width="25%"><b>${st.name}</b></td>
                            <td width="25%"><small>SUL / RS</small></td>
                            <td width="25%" class="${isBad ? 'pessima' : 'excelente'}">${st.ping}ms</td>
                            <td><span class="dot ${isBad ? 'bg-red' : 'bg-green'}"></span> ${isBad ? 'Latência Alta' : 'Estável'}</td>
                        </tr>`;
                }
            });
        });
    }
    function del(k) { db.ref('hsr_monitor/' + k).remove(); }
</script>
</body>
</html>
