<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>HSR | Unified Control Center v3.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --card: #151b26;
            --blue: #0084ff;
            --red: #ff3e3e;
            --green: #00e676;
            --text: #e0e6ed;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        /* Modais e Seletores */
        #selector,
        #login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #232d3d;
        }

        #login-box {
            display: none;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #0a0e14;
            color: white;
            text-align: center;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-station {
            background: var(--blue);
            color: white;
        }

        .btn-server {
            background: #303e52;
            color: white;
        }

        #view-station,
        #view-server {
            display: none;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            border-top: 5px solid var(--blue);
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #232d3d;
        }

        .alert-box {
            display: none;
            background: rgba(255, 62, 62, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .st-card {
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            border-left: 8px solid #444;
        }

        .st-online {
            border-left-color: var(--green);
        }

        .st-warning {
            border-left-color: var(--red);
            animation: blink 1s infinite;
        }

        .st-offline {
            opacity: 0.4;
            border-left-color: #222;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .btn-action {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #333;
            background: #1c2533;
            color: white;
        }
    </style>
</head>

<body>

    <div id="selector">
        <h1>HSR <span style="color:var(--blue)">UNIFIED</span></h1>
        <button class="btn-main btn-station" onclick="initStation()">MODO ESTAÇÃO</button>
        <button class="btn-main btn-server" onclick="showLogin()">MODO MONITOR (SERVER)</button>
    </div>

    <div id="login-box">
        <h2>Acesso Restrito</h2>
        <input type="password" id="pass-field" placeholder="Digite a senha..."
            onkeydown="if(event.key==='Enter') verifyPass()">
        <button class="btn-main btn-station" onclick="verifyPass()">ENTRAR</button>
        <button class="btn-action" onclick="location.reload()">VOLTAR</button>
    </div>

    <div id="view-station">
        <div id="capture-area" class="card">
            <h2 id="display-name">Carregando...</h2>
            <div class="metric-row"><span>IP Público:</span> <span id="ip-res">...</span></div>
            <div class="metric-row"><span>Ping (HSRPBX):</span> <span id="ping-res">-- ms</span></div>
            <div class="metric-row"><span>Saúde CPU:</span> <span id="cpu-res">Iniciando Teste...</span></div>
            <div id="alert-msg" class="alert-box">⚠️ CONEXÃO INSTÁVEL (>40ms)! REINICIE O MODEM.</div>
        </div>
        <button class="btn-action" onclick="runStress()" style="color:var(--blue)">⚡ RODAR STRESS AGORA</button>
        <button class="btn-action" onclick="saveJpeg()">📸 GERAR RELATÓRIO JPEG</button>
        <a href="https://anydesk.com/pt/downloads/thank-you?dv=win_exe" class="btn-action" style="color:var(--red)">⬇️
            BAIXAR ANYDESK</a>
    </div>

    <div id="view-server">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h1>Painel HSR Real-Time</h1>
            <button onclick="clearDatabase()"
                style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold">LIMPAR
                LOGS</button>
        </div>
        <div id="grid-stations" class="grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxu-QXp3lkb1JMW-wmdS7drOYNuNL-3iw",
            authDomain: "interview-69ef5.firebaseapp.com",
            databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/",
            projectId: "interview-69ef5",
            storageBucket: "interview-69ef5.firebasestorage.app",
            messagingSenderId: "877203281572",
            appId: "1:877203281572:web:c86ee64b4d5d32d11ff831"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let currentCPU = "Analisando...";

        // --- LOGIN ---
        function showLogin() {
            document.getElementById('selector').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('pass-field').focus();
        }

        function verifyPass() {
            const pass = document.getElementById('pass-field').value;
            if (pass === 'hsr') {
                document.getElementById('login-box').style.display = 'none';
                initServer();
            } else {
                alert("Senha Incorreta!");
                document.getElementById('pass-field').value = "";
            }
        }

        // --- ESTAÇÃO ---
        function initStation() {
            myName = localStorage.getItem('hsr_st_name');
            if (!myName) {
                myName = prompt("Identificação da Máquina (Ex: INTERVIEW-01):");
                if (!myName) return location.reload();
                localStorage.setItem('hsr_st_name', myName);
            }
            document.getElementById('selector').style.display = 'none';
            document.getElementById('view-station').style.display = 'block';
            document.getElementById('display-name').innerText = "Estação: " + myName;
            getIP(); startMonitoring(); runStress();
            setInterval(runStress, 300000);
        }

        function runStress() {
            const start = performance.now();
            while (performance.now() - start < 1500) { Math.sqrt(Math.random()); }
            currentCPU = (performance.now() - start) < 1650 ? "Saudável" : "Sobrecarga";
            document.getElementById('cpu-res').innerText = currentCPU;
            document.getElementById('cpu-res').style.color = currentCPU === "Saudável" ? "var(--green)" : "var(--red)";
        }

        function getIP() {
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip-res').innerText = d.ip);
        }

        function startMonitoring() {
            setInterval(() => {
                const start = Date.now();
                const img = new Image();
                img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
                img.onload = img.onerror = () => {
                    const ping = Date.now() - start;
                    document.getElementById('ping-res').innerText = ping + " ms";
                    const isBad = ping > 40;
                    document.getElementById('ping-res').style.color = isBad ? 'var(--red)' : 'var(--green)';
                    document.getElementById('alert-msg').style.display = isBad ? 'block' : 'none';
                    db.ref('hsr_monitor/' + myName).update({ name: myName, ip: document.getElementById('ip-res').innerText, ping: ping, cpu: currentCPU, lastSeen: Date.now() });
                };
            }, 5000);
        }

        // --- SERVER ---
        function initServer() {
            document.getElementById('view-server').style.display = 'block';
            db.ref('hsr_monitor').on('value', snap => {
                const grid = document.getElementById('grid-stations');
                grid.innerHTML = "";
                const data = snap.val();
                if (data) {
                    Object.values(data).forEach(st => {
                        const isOff = (Date.now() - st.lastSeen) > 15000;
                        const cardClass = isOff ? 'st-offline' : (st.ping > 40 ? 'st-warning' : 'st-online');
                        grid.innerHTML += `
                        <div class="st-card ${cardClass}">
                            <div style="font-weight:bold">${st.name} <small style="float:right">${isOff ? 'OFF' : 'ON'}</small></div>
                            <div style="font-size:0.8rem; opacity:0.7">${st.ip}</div>
                            <div style="margin-top:10px">Ping: <b>${st.ping}ms</b></div>
                            <div>CPU: <b style="color:${st.cpu === 'Saudável' ? '#00e676' : '#ffeb3b'}">${st.cpu}</b></div>
                        </div>`;
                    });
                }
            });
        }

        function clearDatabase() {
            if (confirm("Limpar registros?")) db.ref('hsr_monitor').remove();
        }

        function saveJpeg() {
            html2canvas(document.querySelector("#capture-area")).then(c => {
                const l = document.createElement('a'); l.download = "HSR_Report.jpg"; l.href = c.toDataURL(); l.click();
            });
        }
    </script>
</body>

</html>
