<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HSR | SUL Monitor List v5.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b111a; --card: #161e2b; --blue: #00a2ff; --red: #ef4444; --green: #00e676; --text: #cfd8dc; --border: #232d3d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .container { max-width: 600px; margin: auto; }
        #selector, #login-box { text-align: center; background: var(--card); padding: 40px; border-radius: 16px; margin-top: 50px; border: 1px solid var(--border); }
        
        /* Estilo Lista (Tabela) */
        .list-container { max-width: 1100px; margin: auto; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #1c2738; color: var(--blue); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .bg-green { background-color: var(--green); box-shadow: 0 0 10px var(--green); }
        .bg-red { background-color: var(--red); box-shadow: 0 0 10px var(--red); animation: blink 1s infinite; }
        
        .btn-main { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-blue { background: var(--blue); color: white; }
        
        .excelente { color: var(--green); font-weight: bold; }
        .pessima { color: var(--red); font-weight: bold; }
        
        @keyframes blink { 50% { opacity: 0.3; } }
        #view-station, #view-server { display: none; }
    </style>
</head>
<body>

    <div id="selector" class="container">
        <h1 style="color:var(--blue)">HSR <span style="color:white">UNIFIED</span></h1>
        <p style="opacity:0.7">Monitoramento em Lista - SUL</p>
        <button class="btn-main btn-blue" onclick="initStation()">ENTRAR COMO ESTAÇÃO</button>
        <button class="btn-main btn-gray" style="margin-top:10px; background:#333; color:white; border:none; cursor:pointer" onclick="showLogin()">ENTRAR COMO SERVER</button>
    </div>

    <div id="login-box" class="container">
        <h2>Acesso Administrativo</h2>
        <input type="password" id="pass-field" style="width:80%; padding:10px; margin-bottom:10px" placeholder="Senha...">
        <button class="btn-main btn-blue" onclick="verifyPass()">ACESSAR PAINEL</button>
    </div>

    <div id="view-station" class="container">
        <div id="capture-area" style="background:var(--card); padding:20px; border-radius:12px; border-left: 6px solid var(--blue)">
            <h2 id="st-title">🌐 ESTAÇÃO</h2>
            <p>IP: <span id="ip-res">...</span></p>
            <p>Latência: <b id="ping-val">...</b></p>
            <p style="color:var(--green)">✓ Modo Otimizado (Sul)</p>
        </div>
    </div>

    <div id="view-server">
        <div style="max-width:1100px; margin: 20px auto; display:flex; justify-content:space-between; align-items:center">
            <h1>Painel de Monitoramento SUL</h1>
            <div id="counter-st" style="font-weight:bold; color:var(--blue)">Iniciando...</div>
        </div>

        <div class="list-container">
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Máquina</th>
                        <th>IP Local</th>
                        <th>Provedor</th>
                        <th>Latência (SUL)</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="list-body">
                    </tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://interview-69ef5-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myName = "";

    function showLogin() { document.getElementById('selector').style.display = 'none'; document.getElementById('login-box').style.display = 'block'; }
    function verifyPass() { if(document.getElementById('pass-field').value === 'hsr') { document.getElementById('login-box').style.display = 'none'; initServer(); } else { alert("Erro!"); } }

    // ESTAÇÃO: Envia sinal a cada 3s
    function initStation() {
        myName = prompt("Nome da Estação:");
        if(!myName) return;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('view-station').style.display = 'block';
        document.getElementById('st-title').innerText = "🌐 " + myName;

        setInterval(() => {
            const start = Date.now();
            const img = new Image();
            img.src = "https://hsrpbx.com.br/favicon.ico?t=" + start;
            img.onload = img.onerror = () => {
                const ping = Date.now() - start;
                document.getElementById('ping-val').innerText = ping + "ms";
                db.ref('hsr_monitor/' + myName).set({
                    name: myName, ping: ping, lastSeen: Date.now()
                });
            };
        }, 3000);
    }

    // SERVER: Lógica de Lista e Auto-Delete (10s)
    function initServer() {
        document.getElementById('view-server').style.display = 'block';
        
        db.ref('hsr_monitor').on('value', snap => {
            const body = document.getElementById('list-body');
            const counter = document.getElementById('counter-st');
            body.innerHTML = "";
            const data = snap.val();
            
            if(!data) { counter.innerText = "0 Máquinas"; return; }

            const entries = Object.keys(data);
            let ativos = 0;

            entries.forEach(key => {
                const st = data[key];
                const tempoOffline = (Date.now() - st.lastSeen) / 1000;

                // SEGUNDOS OFFLINE > 10? APAGA DO FIREBASE E NÃO MOSTRA
                if (tempoOffline > 10) {
                    db.ref('hsr_monitor/' + key).remove();
                    return; 
                }

                ativos++;
                const isBad = st.ping > 70;
                
                body.innerHTML += `
                    <tr>
                        <td><span class="status-dot ${isBad ? 'bg-red' : 'bg-green'}"></span> ${isBad ? 'ALERTA' : 'OK'}</td>
                        <td><b>${st.name}</b></td>
                        <td><small>${st.ip || '---'}</small></td>
                        <td><small>${st.isp || 'SUL / HSR'}</small></td>
                        <td class="${isBad ? 'pessima' : 'excelente'}">${st.ping}ms</td>
                        <td><button onclick="deleteManual('${key}')" style="background:none; border:1px solid var(--red); color:var(--red); cursor:pointer; border-radius:4px">Remover</button></td>
                    </tr>
                `;
            });
            counter.innerText = ativos + " Máquinas Online";
        });
    }

    function deleteManual(key) { db.ref('hsr_monitor/' + key).remove(); }
</script>
</body>
</html>
